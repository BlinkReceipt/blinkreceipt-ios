name: AI Label Validate

on:
  pull_request:
    types: [opened, reopened, labeled, unlabeled, synchronize, ready_for_review]

jobs:
  ai-label-validate:
    uses: BlinkReceipt/github-workflows/.github/workflows/ai-label-validate.yaml@main
    secrets: inherit
    with:
      issue_number: ${{ github.event.pull_request.number }}